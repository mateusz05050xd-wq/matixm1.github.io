<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  transition: 0.4s;
}

/* MOTYWY */
:root {
  --bg1:#1a1a2e;
  --bg2:#0f0f1a;
  --main:#ff00cc;
  --second:#6a5cff;
}

.theme-blue { --main:#00c6ff; --second:#0072ff; }
.theme-green { --main:#00ff88; --second:#00c853; }
.theme-red { --main:#ff3b3b; --second:#ff0000; }

/* TOPBAR */
.topbar {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  z-index: 999;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropbtn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color: white;
  padding: 10px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.dropbtn:hover {
  background: rgba(255,255,255,0.15);
}

.dropdown-content {
  position: absolute;
  top: 45px;
  background: rgba(0,0,0,0.9);
  border-radius: 14px;
  overflow: hidden;
  min-width: 160px;
  display: none;
  animation: fadeIn 0.2s ease;
}

.dropdown-content button {
  width: 100%;
  padding: 12px;
  background: none;
  border: none;
  color: white;
  text-align: left;
  cursor: pointer;
  transition: 0.2s;
}

.dropdown-content button:hover {
  background: rgba(255,255,255,0.1);
}

.show { display: block; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(-10px);}
  to {opacity:1; transform:translateY(0);}
}

/* CONTENT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 100px 20px 60px;
  text-align: center;
}

h1 {
  font-size: 56px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, var(--main), var(--second));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline { margin-bottom: 50px; }

.buttons {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.btn {
  padding: 16px 30px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  background: linear-gradient(45deg,var(--main),var(--second));
  color: white;
  transition: 0.3s;
}

.btn:hover { transform: scale(1.08); }

.card {
  margin-top: 50px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
}

.youtube iframe {
  width: 100%;
  max-width: 800px;
  height: 450px;
  border-radius: 16px;
  margin-top: 30px;
}

footer {
  margin-top: 60px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="topbar">

  <!-- JĘZYK -->
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleMenu('langMenu')">🌐 Język</button>
    <div class="dropdown-content" id="langMenu">
      <button onclick="setLang('pl')">🇵🇱 Polski</button>
      <button onclick="setLang('en')">🇬🇧 English</button>
    </div>
  </div>

  <!-- KOLOR -->
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleMenu('themeMenu')">🎨 Kolor</button>
    <div class="dropdown-content" id="themeMenu">
      <button onclick="setTheme('')">💜 Domyślny</button>
      <button onclick="setTheme('theme-blue')">💙 Niebieski</button>
      <button onclick="setTheme('theme-green')">💚 Zielony</button>
      <button onclick="setTheme('theme-red')">❤️ Czerwony</button>
    </div>
  </div>

</div>

<div class="container">

<h1 id="title">🔥 Społeczność MatiXM 🔥</h1>
<p class="tagline" id="tagline">YouTube • Discord • Gaming • Społeczność</p>

<div class="buttons">
  <a class="btn" id="discordBtn" href="#">💬 Dołącz do Discorda</a>
  <a class="btn" id="ytBtn" href="#">📺 Kanał YouTube</a>
</div>

<div class="card">
  <h2 id="latest">Najnowszy film</h2>
  <p id="desc">Zobacz mój kanał i dołącz do społeczności!</p>
</div>

<div class="youtube">
  <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=MatiXM-123"></iframe>
</div>

<div class="card">
  <h2 id="coop">Współprace 🤝</h2>
  <p id="coopDesc">Chcesz współpracę? Twój serwer pojawi się na Discordzie.</p>
</div>

<footer id="footer">
© 2026 MatiXM • Strona społeczności
</footer>

</div>

<script>

/* DROPDOWN */
function toggleMenu(id) {
  document.querySelectorAll(".dropdown-content").forEach(el => {
    if (el.id !== id) el.classList.remove("show");
  });
  document.getElementById(id).classList.toggle("show");
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".dropdown")) {
    document.querySelectorAll(".dropdown-content").forEach(el => {
      el.classList.remove("show");
    });
  }
});

/* JĘZYKI */
const t = {
  pl: {
    title:"🔥 Społeczność MatiXM 🔥",
    tagline:"YouTube • Discord • Gaming • Społeczność",
    discord:"💬 Dołącz do Discorda",
    yt:"📺 Kanał YouTube",
    latest:"Najnowszy film",
    desc:"Zobacz mój kanał i dołącz do społeczności!",
    coop:"Współprace 🤝",
    coopDesc:"Chcesz współpracę? Twój serwer pojawi się na Discordzie.",
    footer:"© 2026 MatiXM • Strona społeczności"
  },
  en: {
    title:"🔥 MatiXM Community 🔥",
    tagline:"YouTube • Discord • Gaming • Community",
    discord:"💬 Join Discord",
    yt:"📺 YouTube Channel",
    latest:"Latest video",
    desc:"Check out my channel and join the community!",
    coop:"Partnerships 🤝",
    coopDesc:"Want to collaborate? Your server will appear on our Discord.",
    footer:"© 2026 MatiXM • Community website"
  }
};

function setLang(l){
  for(let key in t[l]){
    document.getElementById(key).innerText = t[l][key];
  }
}

/* MOTYW */
function setTheme(theme){
  document.body.className = theme;
}

</script>

</body>
</html>
