<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Społeczność MatiXM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
background:radial-gradient(circle at top,#1a1a2e,#0f0f1a 70%);
overflow-x:hidden;
}

/* animated background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffee,#ff00cc);
background-size:600% 600%;
animation:bgmove 15s ease infinite;
filter:blur(120px);
opacity:0.25;
z-index:-1;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
text-align:center;
}

h1{
font-size:56px;
margin-bottom:10px;
letter-spacing:2px;
}

.tagline{
font-size:20px;
opacity:0.9;
margin-bottom:50px;
}

.buttons{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:60px;
}

.btn{
padding:18px 34px;
border-radius:14px;
text-decoration:none;
font-weight:600;
font-size:18px;
background:linear-gradient(45deg,#ff00cc,#6a5cff);
color:white;
box-shadow:0 0 20px rgba(255,0,200,0.6);
transition:0.25s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 35px rgba(255,0,200,0.9);
}

.youtube{
margin-top:40px;
}

.youtube iframe{
width:100%;
max-width:800px;
height:450px;
border:none;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card{
margin-top:60px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

footer{
margin-top:60px;
font-size:14px;
opacity:0.7;
}

</style>
</head>
<body>

<div class="container">

<h1>🔥 Społeczność MatiXM 🔥</h1>
<p class="tagline">YouTube • Discord • Gaming • Społeczność</p>

<div class="buttons">
<a class="btn" href="https://discord.gg/e2ynfWRC" target="_blank">💬 Dołącz do Discorda</a>
<a class="btn" href="https://www.youtube.com/@MatiXM-123" target="_blank">📺 Kanał YouTube</a>
</div>

<div class="card">
<h2>Najnowszy film</h2>
<p>Zobacz mój kanał i dołącz do społeczności!</p>
</div>

<div class="youtube">
<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=MatiXM-123"></iframe>
</div>

<footer>
© 2026 MatiXM • Strona społeczności
</footer>

</div>

</body>
</html>
