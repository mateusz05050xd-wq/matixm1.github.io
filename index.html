<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Społeczność MatiXM</title>
  <style>
    body {
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg,#6a5cff,#00c6ff,#ff6ec4);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
      color:white;
      text-align:center;
    }

    @keyframes gradient {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:40px 20px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    p{
      font-size:20px;
      opacity:0.9;
    }

    .buttons{
      margin-top:40px;
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:18px 30px;
      border-radius:14px;
      text-decoration:none;
      font-weight:bold;
      font-size:18px;
      background:white;
      color:#333;
      transition:0.25s;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.05);
    }

    footer{
      margin-top:60px;
      opacity:0.8;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>🔥 Społeczność MatiXM 🔥</h1>
    <p>Dołącz do mojej społeczności i bądź na bieżąco!</p>

    <div class="buttons">
      <a class="btn" href="https://discord.gg/e2ynfWRC" target="_blank">💬 Dołącz do Discorda</a>
      <a class="btn" href="https://www.youtube.com/@MatiXM-123" target="_blank">📺 Kanał YouTube</a>
    </div>

    <footer>
      © 2026 MatiXM Community
    </footer>

  </div>
</body>
</html>
